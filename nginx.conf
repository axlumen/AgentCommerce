# AgentCommerce Nginx 配置
#
# 使用方式：
# 1. 复制到 /etc/nginx/sites-available/agent-commerce
# 2. 创建符号链接：sudo ln -s /etc/nginx/sites-available/agent-commerce /etc/nginx/sites-enabled/
# 3. 测试配置：sudo nginx -t
# 4. 重载配置：sudo systemctl reload nginx

# 后端服务器组
upstream fastapi_backend {
    server 127.0.0.1:8000;
    # 多实例负载均衡时取消注释：
    # server 127.0.0.1:8001;
    # server 127.0.0.1:8002;
}

server {
    listen 80;
    server_name localhost;  # 生产环境改为实际域名，如 shop.example.com

    # 日志配置
    access_log /var/log/nginx/agent-commerce-access.log;
    error_log /var/log/nginx/agent-commerce-error.log;

    # Gzip 压缩
    gzip on;
    gzip_types application/json text/css application/javascript text/html;
    gzip_min_length 1024;
    gzip_comp_level 6;

    # 前端静态文件（由 Nginx 直接提供，比 FastAPI 快）
    location / {
        root /path/to/AgentCommerce/frontend;  # 改为实际路径
        index index.html;

        # SPA 路由支持：找不到文件时返回 index.html
        try_files $uri $uri/ /index.html;

        # 缓存策略
        location ~* \.(css|js)$ {
            expires 7d;
            add_header Cache-Control "public";
        }

        location ~* \.(jpg|jpeg|png|gif|ico|svg)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # API 请求转发到 FastAPI
    location /api/ {
        proxy_pass http://fastapi_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;  # AI 推理可能较慢
        proxy_send_timeout 30s;
    }

    # 健康检查（不记录日志）
    location /health {
        proxy_pass http://fastapi_backend;
        access_log off;
    }

    # FastAPI 文档（开发环境可用，生产环境建议禁用）
    location /docs {
        proxy_pass http://fastapi_backend;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://fastapi_backend;
        proxy_set_header Host $host;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

